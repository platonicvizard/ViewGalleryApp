name: Release

# Builds native installers for macOS, Windows, and Linux and publishes them
# as a public GitHub Release whenever a `v*` tag is pushed.
#
# Any signing material (Apple notarization creds, Windows code-signing cert,
# Tauri updater key) must be added as repo Settings > Secrets — never commit
# them. They stay private to the repo even though the published release
# (and its attached installers) is public.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Tauri's bundler treats an env var that's merely *present* (even empty)
      # as "please sign with this" — so these must only be set when the
      # corresponding secret actually has a value, otherwise macOS code
      # signing is attempted with an empty certificate and the build fails.
      - name: Configure Apple signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_SECRET" ]; then
            {
              echo "APPLE_CERTIFICATE<<EOF"
              echo "$APPLE_CERTIFICATE_SECRET"
              echo "EOF"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD_SECRET"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY_SECRET"
              echo "APPLE_ID=$APPLE_ID_SECRET"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET"
            } >> "$GITHUB_ENV"
          fi

      - name: Configure Tauri updater signing
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY_SECRET" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
              echo "$TAURI_SIGNING_PRIVATE_KEY_SECRET"
              echo "EOF"
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ViewGallery ${{ github.ref_name }}"
          releaseBody: "See the assets below to download for your platform."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
